name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          echo "Assets copied successfully"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew || echo "gradlew not found, will use gradle wrapper"

      - name: Build with Gradle
        run: |
          cd android
          ./gradlew assembleRelease || gradle assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xiuxin-app
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Build Success
        if: success()
        run: |
          echo "✅ Build successful!"
          echo "APK version: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
