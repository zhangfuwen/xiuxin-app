# Reduced memory for low-RAM systems (1.8GB total)
org.gradle.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.workers.max=2

# Use Java 17 for Android Gradle Plugin
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-17.0.18.0.8-1.0.2.1.al8.x86_64

# Enable build cache to reduce rebuild time
org.gradle.caching=true
